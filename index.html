<style>
*{

body{

/* MAIN CARD */
.container{
  width:100%;
  max-width:420px;
}

.card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:16px;
  text-align:center;
}

.profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid white;
  object-fit:cover;
}

h1{
  margin-top:10px;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.98);
}

.social-btn{
  background:white;
  color:#1877f2;
}

.contact-btn{
  background:linear-gradient(45deg,#ff7a18,#ff3d00);
  color:white;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.modal.active{
  display:flex;
}

.box{
  background:white;
  color:#1877f2;
  width:100%;
  max-width:360px;
  border-radius:14px;
  padding:18px;
  position:relative;
  animation:pop 0.2s ease;
}

@keyframes pop{
  from{transform:scale(0.9);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* CLOSE */
.close{
  position:absolute;
  right:12px;
  top:10px;
  font-size:20px;
  cursor:pointer;
}

/* SOCIAL LINKS */
.link{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.2s;
}

.link:active{
  transform:scale(0.98);
}

.instagram{background:linear-gradient(45deg,#feda75,#d62976,#962fbf,#4f5bd5);}
.tiktok{background:#000;}
.facebook{background:#1877f2;}
.youtube{background:#ff0000;}

/* FORM */
input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}

textarea{
  min-height:90px;
  resize:none;
}

.send{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1877f2;
  color:white;
  font-weight:bold;
  cursor:pointer;

<script>
emailjs.init("YhAzV94Plowhq2bRE");

/* open modal */
function openModal(type){
  document.querySelectorAll(".modal").forEach(m=>m.classList.remove("active"));
  document.getElementById(type+"Modal").classList.add("active");
}

/* close all */
function closeAll(){
  document.querySelectorAll(".modal").forEach(m=>m.classList.remove("active"));
}

/* close welcome */
function closeWelcome(){
  document.getElementById("welcomeModal").classList.remove("active");
}

/* email validation */
function validEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

/* submit */
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const email = this.email.value.trim();
  const btn = document.getElementById("sendBtn");

  if(!validEmail(email)){
    alert("❌ อีเมลไม่ถูกต้อง");
    return;
  }

  btn.disabled = true;
  btn.innerText = "กำลังส่ง...";

  emailjs.sendForm("service_hropi6d","template_sxab6fs",this)
  .then(()=>{
    alert("✅ ส่งข้อความสำเร็จ");
    this.reset();
  })
  .catch(()=>{
    alert("❌ ส่งไม่สำเร็จ");
  })
  .finally(()=>{
    btn.disabled = false;
    btn.innerText = "ส่งข้อความ";
  });
});
</script>
